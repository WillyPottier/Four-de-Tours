services:
  mysql:
    image: mysql:8.0
    container_name: four-de-tours-db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: four_de_tours
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin
    container_name: four-de-tours-phpmyadmin
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
    ports:
      - "8080:80"
    depends_on:
      - mysql

volumes:
  mysql_data: