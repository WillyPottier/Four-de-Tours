<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - Four de Tours</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Four de Tours</h1>
        <nav>
            <a href="index.html">Boutique</a>
            <a href="connexion.html">Connexion</a>
        </nav>
    </header>

    <main>
        <!-- Formulaire Connexion -->
         <section id="section-connexion">
            <h2>Se connecter</h2>
            <div id="erreur-connexion"></div>
            <div>
                <label for="email-connexion">Email</label>
                <input type="email" id="email-connexion" placeholder="xxxx@gmail.com"/>
            </div>
            <div>
                <label for="password-connexion">Mot de passe</label>
                <input type="password" id="password-connexion" placeholder="••••••••"/>
            </div>
            <button onclick="seConnecter()">Se connecter</button>
            <p>Pas encore de compte ? <a href="#" onclick="basculerFormulaire()">S'inscrire</a></p>
         </section>

         <!-- Formulaire Inscription -->
        <section id="section-inscription" style="display:none">
            <h2>Créer un compte</h2>
            <div id="erreur-inscription"></div>
            <div>
                <label for="nom-inscription">Nom</label>
                <input type="text" id="nom-inscription" placeholder="Willy"/>
            </div>
            <div>
                <label for="email-inscription">Email</label>
                <input type="email" id="email-inscription" placeholder="willy@gmail.com"/>
            </div>
            <div>
                <label for="password-inscription">Mot de passe</label>
                <input type="password" id="password-inscription" placeholder="••••••••"/>
            </div>
            <button onclick="sInscrire()">Créer mon compte</button>
            <p>Déjà un compte ? <a href="#" onclick="seConnecter()">Se connecter</a></p>
        </section>
    </main>

    <script src="js/auth.js"></script>
</body>
</html>
